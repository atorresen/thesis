<script>
    let div = document.getElementById("imgs");
    let numImgs = 32;
    let range = [];
    for (let i = 0; i < numImgs; i++) {
        range.push(i);
    }
    let order = range.sort(
        function(a, b) {return 0.5 - Math.random()}
    );
    for (let e of order) {
        const img = document.createElement("img");
        img.src = "images/install/" + (e + 1) + ".png";
        img.alt = (e + 1) + "";
        img.style = "max-height: 300px";
        img.loading = "lazy";
        div.appendChild(img)
    }

</script>
